<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>食辰</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      line-height: 1.8;
      color: #333;
      background: #FFFBF5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px 16px;
    }
    .container { text-align: center; max-width: 480px; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; color: #1a1a1a; }
    p { font-size: 15px; color: #666; margin-bottom: 24px; }
    .links { display: flex; flex-direction: column; gap: 12px; }
    .links a {
      display: block;
      padding: 12px 24px;
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      text-decoration: none;
      color: #1a1a1a;
      font-size: 15px;
      font-weight: 500;
      transition: all 0.2s;
    }
    .links a:hover { border-color: #FF8C42; color: #FF8C42; }
  </style>
</head>
<body>
  <div class="container">
    <h1>食辰</h1>
    <p>省心做饭的厨房小帮手</p>
    <div class="links">
      <a href="privacy-policy/">隐私政策</a>
      <a href="user-agreement/">用户协议</a>
    </div>
  </div>
</body>
</html>
